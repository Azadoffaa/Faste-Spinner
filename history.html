<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FateSPINNER History</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=Spline+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body data-page="history">
    <nav>
        <a href="./index.html" class="logo"><img src="./img/Group.png" alt="">Fate<span>SPINNER</span></a>
        <ul>
            <li><a href="./index.html" class="nav-link">My Wheel</a></li>
            <li><a href="./persets.html" class="nav-link">Presets</a></li>
            <li><a href="./history.html" class="nav-link nav-link-active">History</a></li>
            <li><a href="./new-fate.html" class="nav-link">Create New</a></li>
        </ul>
        <button class="new-fate" type="button" data-preset-link="./index.html">Spin New Fate</button>
    </nav>

    <main class="history-main">
        <section class="history-page">
            <header class="history-header">
                <h1 class="history-title">History</h1>
                <p class="history-subtitle">Your past encounters with destiny.</p>
            </header>

            <section class="history-empty-card" id="history-empty-state">
                <div class="history-empty-icon" aria-hidden="true">
                    <img src="./img/SVG1.png" alt="">
                </div>
                <h2 class="history-empty-title">No spins yet</h2>
                <p class="history-empty-text">Your fate awaits. Spin a wheel to begin.</p>
            </section>

            <section class="history-table" id="history-table" hidden>
                <div class="history-table-head">
                    <p>WHEEL</p>
                    <p>DATE</p>
                    <p>FATE DECIDED</p>
                </div>
                <div class="history-table-body" id="history-list"></div>
            </section>
        </section>
    </main>

    <nav class="mobile-dock" aria-label="Mobile navigation">
        <button class="mobile-dock-item" type="button" aria-label="Current wheel" data-mobile-link="./index.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="7.5" fill="none" stroke="currentColor" stroke-width="2.4"></circle>
                <circle cx="12" cy="12" r="1.8" fill="currentColor"></circle>
            </svg>
        </button>
        <button class="mobile-dock-item" type="button" aria-label="Presets" data-mobile-link="./persets.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3.5" y="3.5" width="6" height="6" rx="1.2" fill="none" stroke="currentColor" stroke-width="2"></rect>
                <rect x="14.5" y="3.5" width="6" height="6" rx="1.2" fill="none" stroke="currentColor" stroke-width="2"></rect>
                <rect x="3.5" y="14.5" width="6" height="6" rx="1.2" fill="none" stroke="currentColor" stroke-width="2"></rect>
                <rect x="14.5" y="14.5" width="6" height="6" rx="1.2" fill="none" stroke="currentColor" stroke-width="2"></rect>
            </svg>
        </button>
        <button class="mobile-dock-item mobile-dock-item-active" type="button" aria-label="History" data-mobile-link="./history.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 6v5h5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M6.4 15.7A8 8 0 1 0 7 8.8" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
        </button>
        <button class="mobile-dock-item" type="button" aria-label="Create new" data-mobile-link="./new-fate.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 4v16M4 12h16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path>
            </svg>
        </button>
    </nav>

    <script src="./script.js"></script>
</body>

</html>
